{% extends "base.html" %}

{% block content %}
<div class="main-card choose-card-shell" style="text-align:center;">

  <h2 class="slide-title">Now let's get started!</h2>
  <p class="slide-subtitle">Choose your dump-and-bake recipe</p>

  <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center recipe-choice-grid">
    {% for key, recipe in recipes.items() %}
    <div class="col-md-4 col-lg-3">
      <a href="{{ url_for('recipe', recipe_name=key, step=1) }}" class="recipe-choice-link">
        <div
          class="recipe-choice-card"
          style="border-color: {{ recipe.color }};"
          onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,0.1)'"
          onmouseout="this.style.transform='';this.style.boxShadow=''"
        >
          <div class="recipe-choice-emoji">{{ recipe.emoji }}</div>
          <div class="display-font recipe-choice-title">
            One Pan<br>{{ recipe.display_name }}
          </div>
          <div class="recipe-choice-cta">
            <span class="btn-next recipe-choice-btn">Get Started →</span>
          </div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>

</div>
{% endblock %}
