{% extends "base.html" %}

{% block content %}
<div class="main-card text-center">

  {% if recipe_name == 'muffins' %}
    <img src="{{ url_for('static', filename='images/plate-with-muffin.png') }}"
         alt="plated muffin"
         class="result-hero-image mb-3"
         style="max-width: 320px; width: 100%; height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.15));">
  {% else %}
    <div class="display-1 mb-3">🎉</div>
  {% endif %}

  <h2 class="slide-title">You did it!</h2>
  <p class="slide-subtitle">Now enjoy 🍽️</p>

  <p class="slide-body mx-auto mb-4 result-body-copy">
    You've learned the recipe and completed the cooking game.
    Time to actually make it — you've got this!
  </p>

  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{{ url_for('quiz', recipe_name=recipe_name, step=1) }}" class="btn-prev">
      Take Quiz Again
    </a>
    <a href="{{ url_for('choose_recipe') }}" class="btn-next">
      Try Another Recipe →
    </a>
    <a href="{{ url_for('home') }}" class="btn-next btn-next-home">
      🏠 Home
    </a>
  </div>

</div>
{% endblock %}
