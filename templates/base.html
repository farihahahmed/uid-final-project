<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazy College Cook 🧁</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Top nav -->
  <nav class="top-nav">
    <a href="{{ url_for('home') }}" {% if request.endpoint == 'home' %}class="active"{% endif %}>🏠 Home</a>
    <a href="{{ url_for('mealprep', step=1) }}" {% if request.endpoint == 'mealprep' %}class="active"{% endif %}>📅 Meal Prep</a>
    <a href="{{ url_for('choose_recipe') }}" {% if request.endpoint == 'choose_recipe' %}class="active"{% endif %}>🍽️ Choose Recipe</a>
    <a href="{{ url_for('recipe', recipe_name='muffins', step=1) }}" {% if request.endpoint == 'recipe' and recipe_name == 'muffins' %}class="active"{% endif %}>🧁 Muffins</a>
    <a href="{{ url_for('recipe', recipe_name='casserole', step=1) }}" {% if request.endpoint == 'recipe' and recipe_name == 'casserole' %}class="active"{% endif %}>🥘 Casserole</a>
    <a href="{{ url_for('recipe', recipe_name='fajitas', step=1) }}" {% if request.endpoint == 'recipe' and recipe_name == 'fajitas' %}class="active"{% endif %}>🥙 Fajitas</a>
  </nav>

  {% block progress %}{% endblock %}

  {% block content %}{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
