<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazy College Cook 🧁</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div id="custom-cursor" aria-hidden="true"></div>
  <audio
    id="background-music"
    src="{{ url_for('static', filename='sounds/home-page-music.mp3') }}"
    loop
    preload="auto"
  ></audio>
  <button type="button" class="music-toggle" id="music-toggle" aria-pressed="false" aria-label="Mute music">
    <span class="music-toggle-icon" aria-hidden="true">ON</span>
    <span class="music-toggle-text">Music On</span>
  </button>

  <!-- Top nav -->
  <nav class="top-nav">
    <div class="container-fluid px-2 px-sm-3">
      <div class="row g-2 nav-row">
        <div class="col-6 col-md-4 col-xl">
          <a href="{{ url_for('home') }}" class="top-nav-link {% if request.endpoint == 'home' %}active{% endif %}">🏠 Home</a>
        </div>
        <div class="col-6 col-md-8 col-xl">
          <a href="{{ url_for('mealprep', step=1) }}" class="top-nav-link top-nav-link-mealprep {% if request.endpoint == 'mealprep' %}active{% endif %}">📅 Before We Start: How to Meal Prep!</a>
        </div>
        <div class="col-6 col-md-4 col-xl">
          <a href="{{ url_for('choose_recipe') }}" class="top-nav-link {% if request.endpoint == 'choose_recipe' %}active{% endif %}">🍽️ Choose Recipe</a>
        </div>
        <div class="col-6 col-md-4 col-xl">
          <div class="top-nav-dropdown">
            <a href="{{ url_for('recipe', recipe_name='muffins', step=1) }}" class="top-nav-link">🧁 Muffins</a>
            <div class="top-nav-menu">
              <a href="{{ url_for('recipe', recipe_name='muffins', step=1) }}" class="top-nav-menu-item">📖 Recipe</a>
              <a href="{{ url_for('quiz', recipe_name='muffins', step=1) }}" class="top-nav-menu-item">🎮 Quiz</a>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-4 col-xl">
          <div class="top-nav-dropdown">
            <a href="{{ url_for('recipe', recipe_name='casserole', step=1) }}" class="top-nav-link">🥘 Casserole</a>
            <div class="top-nav-menu">
              <a href="{{ url_for('recipe', recipe_name='casserole', step=1) }}" class="top-nav-menu-item">📖 Recipe</a>
              <a href="{{ url_for('quiz', recipe_name='casserole', step=1) }}" class="top-nav-menu-item">🎮 Quiz</a>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-4 col-xl">
          <div class="top-nav-dropdown">
            <a href="{{ url_for('recipe', recipe_name='fajitas', step=1) }}" class="top-nav-link">🥙 Fajitas</a>
            <div class="top-nav-menu">
              <a href="{{ url_for('recipe', recipe_name='fajitas', step=1) }}" class="top-nav-menu-item">📖 Recipe</a>
              <a href="{{ url_for('quiz', recipe_name='fajitas', step=1) }}" class="top-nav-menu-item">🎮 Quiz</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  {% block progress %}{% endblock %}

  {% block content %}{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    (function () {
      const music = document.getElementById('background-music');
      const toggle = document.getElementById('music-toggle');
      if (!music || !toggle) {
        return;
      }

      const mutedKey = 'backgroundMusicMuted';
      const timeKey = 'backgroundMusicTime';
      const icon = toggle.querySelector('.music-toggle-icon');
      const text = toggle.querySelector('.music-toggle-text');

      function isMuted() {
        return window.localStorage.getItem(mutedKey) === 'true';
      }

      function updateButton() {
        const muted = music.muted;
        toggle.setAttribute('aria-pressed', muted ? 'true' : 'false');
        toggle.setAttribute('aria-label', muted ? 'Unmute music' : 'Mute music');
        if (icon) icon.textContent = muted ? 'OFF' : 'ON';
        if (text) text.textContent = muted ? 'Music Off' : 'Music On';
      }

      function savePosition() {
        if (Number.isFinite(music.currentTime)) {
          window.localStorage.setItem(timeKey, String(music.currentTime));
        }
      }

      function restorePosition() {
        const savedTime = parseFloat(window.localStorage.getItem(timeKey));
        if (!Number.isFinite(savedTime) || savedTime <= 0) {
          return;
        }

        const duration = Number.isFinite(music.duration) ? music.duration : 0;
        music.currentTime = duration > 0 ? savedTime % duration : savedTime;
      }

      function playMusic() {
        if (music.muted) {
          return;
        }
        music.play()
          .catch(function () {
            // Browsers may block audio until the first user gesture.
          });
      }

      music.volume = 0.35;
      music.muted = isMuted();
      updateButton();
      music.addEventListener('loadedmetadata', restorePosition, { once: true });
      if (music.readyState >= 1) {
        restorePosition();
      }
      music.addEventListener('timeupdate', savePosition);
      window.addEventListener('pagehide', savePosition);

      toggle.addEventListener('click', function () {
        savePosition();
        music.muted = !music.muted;
        window.localStorage.setItem(mutedKey, music.muted ? 'true' : 'false');
        updateButton();
        if (!music.muted) {
          playMusic();
        }
      });

      if (!music.muted) {
        playMusic();
      }

      ['pointerdown', 'keydown', 'touchstart'].forEach(function (eventName) {
        document.addEventListener(eventName, playMusic, { once: true, passive: true });
      });
    })();
  </script>
  <script>
    $(function () {
      if (!window.matchMedia('(pointer:fine)').matches) {
        return;
      }

      const $body = $('body');
      const $cursor = $('#custom-cursor');
      const interactiveSelector = 'a, button, [role="button"], .btn-next, .btn-prev, .btn-check-answer, .knob-btn, .drag-item, .set-aside-draggable, input[type="button"], input[type="submit"], input[type="range"], label[for], summary';
      const storageKeyX = 'customCursorX';
      const storageKeyY = 'customCursorY';
      const storageKeyMode = 'customCursorMode';
      let cursorVisible = false;

      $body.addClass('custom-cursor-enabled');

      const savedX = window.sessionStorage.getItem(storageKeyX);
      const savedY = window.sessionStorage.getItem(storageKeyY);

      if (savedX !== null && savedY !== null) {
        $cursor.css({
          left: savedX + 'px',
          top: savedY + 'px'
        });
        if (window.sessionStorage.getItem(storageKeyMode) === 'hand') {
          $cursor.addClass('is-hand');
        }
        $cursor.addClass('is-visible');
        cursorVisible = true;
      }

      $(document)
        .on('mousemove', function (event) {
          if (!cursorVisible) {
            $cursor.addClass('is-visible');
            cursorVisible = true;
          }

          $cursor.css({
            left: event.clientX + 'px',
            top: event.clientY + 'px'
          });

          window.sessionStorage.setItem(storageKeyX, event.clientX);
          window.sessionStorage.setItem(storageKeyY, event.clientY);
        })
        .on('mouseenter', interactiveSelector, function () {
          $cursor.addClass('is-hand');
          window.sessionStorage.setItem(storageKeyMode, 'hand');
        })
        .on('mouseleave', interactiveSelector, function () {
          $cursor.removeClass('is-hand');
          window.sessionStorage.setItem(storageKeyMode, 'arrow');
        })
        .on('mousedown', function () {
          $cursor.addClass('is-clicking');
        })
        .on('mouseup', function () {
          $cursor.removeClass('is-clicking');
        })
        .on('mousedown', interactiveSelector, function () {
          $cursor.addClass('is-hand');
          window.sessionStorage.setItem(storageKeyMode, 'hand');
        })
        .on('mousemove', function (event) {
          const targetIsInteractive = $(event.target).closest(interactiveSelector).length > 0;
          window.sessionStorage.setItem(storageKeyMode, targetIsInteractive ? 'hand' : 'arrow');
        });
    });
  </script>
  <script>
    document.addEventListener('keydown', function (event) {
      if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.altKey) {
        return;
      }

      if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') {
        return;
      }

      const activeElement = document.activeElement;
      if (
        activeElement &&
        activeElement.matches('input, textarea, select, [contenteditable="true"]')
      ) {
        return;
      }

      const selector = event.key === 'ArrowRight' ? '.btn-next[href]' : '.btn-prev[href]';
      const candidates = Array.from(document.querySelectorAll(selector));

      const target = candidates.find((element) => {
        const style = window.getComputedStyle(element);
        const isVisible =
          style.display !== 'none' &&
          style.visibility !== 'hidden' &&
          element.getClientRects().length > 0;
        const isEnabled =
          style.pointerEvents !== 'none' &&
          !element.hasAttribute('disabled') &&
          element.getAttribute('aria-disabled') !== 'true';

        return isVisible && isEnabled;
      });

      if (!target) {
        return;
      }

      event.preventDefault();
      target.click();
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
